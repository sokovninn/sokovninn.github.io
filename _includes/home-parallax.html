{% comment %} Refined parallax layers — paired with home-hero__mesh in SCSS {% endcomment %}
<div class="home-hero__parallax" aria-hidden="true">
  <svg class="home-parallax__layer js-parallax-layer" data-parallax="0.28" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" preserveAspectRatio="xMidYMid slice" focusable="false">
    <defs>
      <pattern id="hp-dots" width="56" height="56" patternUnits="userSpaceOnUse">
        <circle cx="1" cy="1" r="0.9" fill="rgba(255,255,255,0.035)"/>
      </pattern>
      <linearGradient id="hp-vignette-svg" x1="0.5" y1="0" x2="0.5" y2="1">
        <stop offset="0%" stop-color="#030508" stop-opacity="0"/>
        <stop offset="100%" stop-color="#030508" stop-opacity="0.55"/>
      </linearGradient>
    </defs>
    <rect width="900" height="700" fill="url(#hp-dots)"/>
    <rect width="900" height="700" fill="url(#hp-vignette-svg)"/>
  </svg>
  <svg class="home-parallax__layer js-parallax-layer" data-parallax="0.52" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" preserveAspectRatio="xMidYMid slice" focusable="false">
    <defs>
      <linearGradient id="hp-stroke" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="rgba(0,200,175,0)" stop-opacity="0"/>
        <stop offset="35%" stop-color="rgba(0,190,165,0.35)"/>
        <stop offset="70%" stop-color="rgba(0,200,175,0.25)"/>
        <stop offset="100%" stop-color="rgba(0,200,175,0)" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <g fill="none" stroke-linecap="round">
      <path d="M80 420 Q 280 300 450 380 T 820 340" stroke="url(#hp-stroke)" stroke-width="1.25" vector-effect="non-scaling-stroke"/>
      <circle cx="80" cy="420" r="4" fill="rgba(0,200,175,0.15)" stroke="rgba(0,200,175,0.35)" stroke-width="1"/>
      <circle cx="450" cy="380" r="5" fill="rgba(0,200,175,0.12)" stroke="rgba(0,200,175,0.4)" stroke-width="1"/>
      <circle cx="820" cy="340" r="4" fill="rgba(0,200,175,0.15)" stroke="rgba(0,200,175,0.35)" stroke-width="1"/>
    </g>
  </svg>
  <svg class="home-parallax__layer js-parallax-layer" data-parallax="0.68" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" preserveAspectRatio="xMidYMid slice" focusable="false">
    <g fill="none" stroke="rgba(120,160,175,0.12)" stroke-width="1" opacity="0.85">
      <path d="M720 80 L780 80 L780 140"/>
      <path d="M120 620 L60 620 L60 560"/>
    </g>
  </svg>
</div>
